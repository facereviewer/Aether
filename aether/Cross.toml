# Used by `cross build --target armv7-unknown-linux-musleabihf` in the
# release workflow.
#
# Uses the `edge` image tag, not `latest`: the `latest` tag is pinned to
# cross 0.2.5 (2022) and ships a pre-C++17 g++, which can't build
# BoringSSL 5.x (needs C++17 headers like <string_view>). `edge` is
# rebuilt regularly from cross's `main` branch with a newer toolchain.
#
# The image has the musl cross toolchain and cmake, but not go/ninja,
# which BoringSSL's build needs.
[target.armv7-unknown-linux-musleabihf]
image = "ghcr.io/cross-rs/armv7-unknown-linux-musleabihf:edge"
pre-build = [
    "apt-get update && apt-get install --assume-yes ninja-build golang-go",
]
